<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AEGIS PRO v2 — Password Recovery</title>
  <meta name="description" content="Password recovery for AegisPro."/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://apis.google.com; frame-src 'self' https://*.firebaseapp.com; connect-src 'self' https://*.googleapis.com https://*.firebaseapp.com wss://*.googleapis.com wss://*.firebasedatabase.com https://*.firebaseio.com wss://*.firebaseio.com;" />
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="auth-page">

<!-- Reused 3D Background -->
<canvas id="bg-canvas"></canvas>
<div id="particles"></div>

<div class="auth-container">
  <div class="gc auth-card">
    <div class="auth-header">
      <svg class="auth-logo" viewBox="0 0 200 220" fill="none" style="width: 50px; height: 50px; margin-bottom: 15px;">
        <path d="M100 8L180 40L180 110Q180 170 100 210Q20 170 20 110L20 40Z" stroke="#00d4ff" stroke-width="8" fill="rgba(123,79,255,0.1)"/>
        <circle cx="100" cy="110" r="30" stroke="#7b4fff" stroke-width="8" fill="none"/>
        <line x1="80" y1="110" x2="120" y2="110" stroke="#00d4ff" stroke-width="6"/>
      </svg>
      <h1 class="auth-title">System Override</h1>
      <p class="auth-sub" id="override-subtitle">Enter your email to receive a secure reset link.</p>
    </div>

    <form id="reset-form" class="auth-form">
      <div class="auth-group">
        <label for="reset-email">Email Address</label>
        <input type="email" id="reset-email" class="gi" placeholder="engineer@aegis.local" required autocomplete="email">
      </div>
      
      <button type="submit" class="auth-btn calc-btn" style="background: var(--grad-secondary);">Transmit Link</button>
    </form>
    
    <div class="auth-footer" style="margin-top: 30px;">
      <a href="index.html" class="auth-link">← Back to Login Terminal</a>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics-compat.js"></script>
<script src="app.js"></script>
<script src="firebase-auth.js"></script>
</body>
</html>
