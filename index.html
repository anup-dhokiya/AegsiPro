<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AEGIS PRO v2 — Login</title>
  <meta name="description" content="Login to AegisPro, the comprehensive interactive cloud security learning dashboard."/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; script-src 'self';"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="auth-page">

<!-- Reused 3D Background -->
<canvas id="bg-canvas"></canvas>
<div id="particles"></div>

<div class="auth-container">
  <div class="gc auth-card">
    <div class="auth-header">
      <svg class="auth-logo" viewBox="0 0 200 220" fill="none">
        <defs>
          <linearGradient id="sg2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00d4ff"/><stop offset="100%" stop-color="#3b82f6"/>
          </linearGradient>
        </defs>
        <path d="M100 8L180 40L180 110Q180 170 100 210Q20 170 20 110L20 40Z" stroke="url(#sg2)" stroke-width="6" fill="rgba(123,79,255,0.15)"/>
        <rect x="83" y="102" width="34" height="26" rx="5" stroke="#00d4ff" stroke-width="4" fill="rgba(123,79,255,0.2)"/>
        <path d="M90 102L90 94Q90 82 100 82Q110 82 110 94L110 102" stroke="#00d4ff" stroke-width="4" fill="none"/>
        <circle cx="100" cy="115" r="5" fill="#00d4ff"/>
      </svg>
      <h1 class="auth-title">AEGIS PRO</h1>
      <p class="auth-sub">Enter your credentials to access the platform.</p>
    </div>

    <form id="login-form" class="auth-form">
      <div class="auth-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" class="gi" placeholder="engineer@aegis.local" required autocomplete="email">
      </div>
      <div class="auth-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="gi" placeholder="••••••••••••" required autocomplete="current-password">
      </div>
      
      <div class="auth-actions-row">
        <label class="auth-checkbox">
          <input type="checkbox" checked>
          <span>Remember me</span>
        </label>
        <a href="forgot-password.html" class="auth-link">Forgot password?</a>
      </div>

      <button type="submit" class="auth-btn calc-btn">⚡ Access Terminal</button>
    </form>
    
    <div class="auth-footer">
      <p>Don't have an account? <a href="register.html" class="auth-link">Request Access</a></p>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script type="module" src="firebase-auth.js"></script>
</body>
</html>
