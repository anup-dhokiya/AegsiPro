<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AEGIS PRO v2 — Login</title>
  <meta name="description" content="Login to AegisPro, the comprehensive interactive cloud security learning dashboard."/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://apis.google.com; frame-src 'self' https://*.firebaseapp.com; connect-src 'self' https://*.googleapis.com https://*.firebaseapp.com wss://*.googleapis.com wss://*.firebasedatabase.com https://*.firebaseio.com wss://*.firebaseio.com;" />
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="auth-page">

<!-- Reused 3D Background -->
<canvas id="bg-canvas"></canvas>
<div id="particles"></div>

<div class="auth-container">
  <div class="gc auth-card">
    <div class="auth-header">
      <svg class="auth-logo" viewBox="0 0 200 220" fill="none">
        <defs>
          <linearGradient id="sg2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00d4ff"/><stop offset="100%" stop-color="#3b82f6"/>
          </linearGradient>
        </defs>
        <path d="M100 8L180 40L180 110Q180 170 100 210Q20 170 20 110L20 40Z" stroke="url(#sg2)" stroke-width="6" fill="rgba(123,79,255,0.15)"/>
        <rect x="83" y="102" width="34" height="26" rx="5" stroke="#00d4ff" stroke-width="4" fill="rgba(123,79,255,0.2)"/>
        <path d="M90 102L90 94Q90 82 100 82Q110 82 110 94L110 102" stroke="#00d4ff" stroke-width="4" fill="none"/>
        <circle cx="100" cy="115" r="5" fill="#00d4ff"/>
      </svg>
      <h1 class="auth-title">AEGIS PRO</h1>
      <p class="auth-sub">Enter your credentials to access the platform.</p>
    </div>

    <form id="login-form" class="auth-form">
      <div class="auth-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" class="gi" placeholder="engineer@aegis.local" required autocomplete="email">
      </div>
      <div class="auth-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="gi" placeholder="••••••••••••" required autocomplete="current-password">
      </div>
      
      <div class="auth-actions-row">
        <label class="auth-checkbox">
          <input type="checkbox" checked>
          <span>Remember me</span>
        </label>
        <a href="forgot-password.html" class="auth-link">Forgot password?</a>
      </div>

      <button type="submit" class="auth-btn calc-btn">⚡ Access Terminal</button>
      
      <div class="auth-divider"><span>OR</span></div>
      
      <button type="button" id="google-signin-btn" class="google-btn">
        <svg class="google-icon" viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>
    </form>
    
    <div class="auth-footer">
      <p>Don't have an account? <a href="register.html" class="auth-link">Request Access</a></p>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics-compat.js"></script>
<script src="app.js"></script>
<script src="firebase-auth.js"></script>
</body>
</html>
