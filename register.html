<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AEGIS PRO v2 — Create Account</title>
  <meta name="description" content="Create a new account for AegisPro."/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://apis.google.com; frame-src 'self' https://*.firebaseapp.com; connect-src 'self' https://*.googleapis.com https://*.firebaseapp.com wss://*.googleapis.com wss://*.firebasedatabase.com https://*.firebaseio.com wss://*.firebaseio.com;" />
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="auth-page">

<!-- Reused 3D Background -->
<canvas id="bg-canvas"></canvas>
<div id="particles"></div>

<div class="auth-container">
  <div class="gc auth-card">
    <div class="auth-header">
      <h1 class="auth-title">Initialize Access</h1>
      <p class="auth-sub">Create a new secure terminal account.</p>
    </div>

    <form id="register-form" class="auth-form">
      <div class="auth-group">
        <label for="reg-name">Full Name</label>
        <input type="text" id="reg-name" class="gi" placeholder="Alex Mercer" required>
      </div>

      <div class="auth-group">
        <label for="reg-email">Email Address</label>
        <input type="email" id="reg-email" class="gi" placeholder="engineer@aegis.local" required autocomplete="email">
      </div>

      <div class="auth-group">
        <label for="reg-role">Role/Specialization</label>
        <select id="reg-role" class="gi" style="background: rgba(0, 0, 0, 0.2); border: 1px solid var(--border); color: var(--on-surface); cursor: pointer;" required>
          <option value="" disabled selected style="background: #0f0f24; color: var(--on-surface-3);">Select your role</option>
          <option value="Cloud Security Engineer" style="background: #0f0f24; color: var(--on-surface);">Cloud Security Engineer</option>
          <option value="DevSecOps Engineer" style="background: #0f0f24; color: var(--on-surface);">DevSecOps Engineer</option>
          <option value="Security Analyst" style="background: #0f0f24; color: var(--on-surface);">Security Analyst</option>
          <option value="Penetration Tester" style="background: #0f0f24; color: var(--on-surface);">Penetration Tester</option>
          <option value="Student / Learner" style="background: #0f0f24; color: var(--on-surface);">Student / Learner</option>
        </select>
      </div>

      <div class="auth-group">
        <label for="reg-question">Security Question</label>
        <select id="reg-question" class="gi" style="background: rgba(0, 0, 0, 0.2); border: 1px solid var(--border); color: var(--on-surface); cursor: pointer;" required>
          <option value="" disabled selected style="background: #0f0f24; color: var(--on-surface-3);">Select a security question</option>
          <option value="What was your first hacking handle?" style="background: #0f0f24; color: var(--on-surface);">What was your first hacking handle?</option>
          <option value="What is your favorite encryption algorithm?" style="background: #0f0f24; color: var(--on-surface);">What is your favorite encryption algorithm?</option>
          <option value="What is your first security certification?" style="background: #0f0f24; color: var(--on-surface);">What is your first security certification?</option>
          <option value="What was the name of your first computer?" style="background: #0f0f24; color: var(--on-surface);">What was the name of your first computer?</option>
        </select>
      </div>

      <div class="auth-group">
        <label for="reg-answer">Security Answer</label>
        <input type="text" id="reg-answer" class="gi" placeholder="Your Answer" required>
      </div>

      <div class="auth-group">
        <label for="reg-password">Password (Min 6 Characters)</label>
        <input type="password" id="reg-password" class="gi" placeholder="••••••••••••" required autocomplete="new-password">
      </div>
      
      <button type="submit" class="auth-btn calc-btn" style="background: var(--grad-primary); margin-top: 10px;">Create Account</button>
      
      <div class="auth-divider"><span>OR</span></div>
      
      <button type="button" id="google-signin-btn" class="google-btn">
        <svg class="google-icon" viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>
    </form>
    
    <div class="auth-footer" style="margin-top: 20px;">
      <p>Already have access? <a href="index.html" class="auth-link">Return to Login</a></p>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics-compat.js"></script>
<script src="app.js"></script>
<script src="firebase-auth.js"></script>
</body>
</html>
